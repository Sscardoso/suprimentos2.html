<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Suprimento Selbetti</title>

<style>

body{
font-family:Segoe UI;
background:#f4f7f6;
display:flex;
justify-content:center;
padding:40px;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 4px 20px rgba(0,0,0,0.1);
width:100%;
max-width:500px;
}

h2{
color:#008000;
text-align:center;
}

input{
width:100%;
padding:12px;
border:2px solid #ddd;
border-radius:6px;
font-size:16px;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
background:#008000;
color:white;
border:none;
border-radius:6px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

#resultado{
display:none;
margin-top:20px;
border-top:1px solid #eee;
padding-top:20px;
}

.erro{
display:none;
color:red;
text-align:center;
font-weight:bold;
}

</style>
</head>

<body>

<div class="card">

<h2>Consulta de Suprimento</h2>

<input id="inputSelb" placeholder="Digite a SELB">

<button onclick="buscar()">BUSCAR</button>

<div id="erroMsg" class="erro">
SELB não encontrada
</div>

<div id="resultado">

Divisão:
<div id="resDivisao"></div>

Agência:
<div id="resAgencia"></div>

Modelo:
<div id="resModelo"></div>

Série:
<div id="resSerie"></div>

Selb:
<div id="resSelb"></div>

Endereço:
<div id="resEndereco"></div>

<img id="imgSuprimento"
src="Kit-Drum-500z-Toner-604h-Compat-vel-Para-Lexmark-Mx611dhe_1726583285_p.webp"
style="width:150px;display:none">

</div>

</div>

<script>

const baseDados = [

{selb:"3Y97",divisao:"SEMINOVOS",agencia:"LJOPI",modelo:"MX632",serie:"7020405204HZH",endereco:"ITU/SP"},

{selb:"3Y62",divisao:"SEMINOVOS",agencia:"LJOPI",modelo:"MX632",serie:"7020405204HYW",endereco:"ITU/SP"},

{selb:"04VU",divisao:"LOCALIZA",agencia:"RDMAB",modelo:"MX611",serie:"701631HH015XK",endereco:"MARABA/PA"}

];

function buscar(){

const busca=document.getElementById("inputSelb").value.toUpperCase();

const item=baseDados.find(x=>x.selb===busca);

if(item){

document.getElementById("resDivisao").innerText=item.divisao;
document.getElementById("resAgencia").innerText=item.agencia;
document.getElementById("resModelo").innerText=item.modelo;
document.getElementById("resSerie").innerText=item.serie;
document.getElementById("resSelb").innerText=item.selb;
document.getElementById("resEndereco").innerText=item.endereco;

document.getElementById("resultado").style.display="block";
document.getElementById("erroMsg").style.display="none";
document.getElementById("imgSuprimento").style.display="block";

}
else{

document.getElementById("resultado").style.display="none";
document.getElementById("erroMsg").style.display="block";

}

}

</script>

</body>
</html>
